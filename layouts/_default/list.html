{{ define "main" }}
  {{ partial "header.html" . }}
  <div class="py-16">
    {{ $posts := where .Site.RegularPages "Section" "posts" }}
    <ul class="mb-2 mx-auto w-fit">
      {{ range $posts }}
        {{ $day := .Date.Day }}
        <li class="max-w-max flex">
          <span class="mr-2 shrink-0"
            >[{{ .Date.Format "02/01/2006" }}]</span
          >
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </li>
      {{ end }}
    </ul>
  </div>
{{ end }}
