<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>dyyni.org</title>
        <link rel="stylesheet" href="/styles.css">
        <link rel="icon" type="image/x-icon" href="/static/favicon.ico">

        <link rel="preload" href="/static/icons/email.svg" as="image" type="image/svg+xml">
        <link rel="preload" href="/static/icons/pgp.svg" as="image" type="image/svg+xml">
        <link rel="preload" href="/static/icons/signal.svg" as="image" type="image/svg+xml">
        <link rel="preload" href="/static/icons/monero.svg" as="image" type="image/svg+xml">
        <link rel="preload" href="/static/icons/telegram.svg" as="image" type="image/svg+xml">
        <link rel="preload" href="/static/icons/codeberg.svg" as="image" type="image/svg+xml">

        <script>document.documentElement.classList.add("js")</script>
        <script defer src="/dice.js"></script>
        <script defer src="/blackbox.js"></script>
    </head>
    <body class="flex flex-col md:items-center md:justify-center min-h-screen bg-bg">
        <noscript>
            <ul class="font-semibold flex flex-col items-center justify-center min-h-screen">
                <li>Email: a (at) this domain</li>
                <li>PGP: <a href="/static/pgp.asc">1530 .. 2B3E</a></li>
                <li>Signal: <a href="https://signal.me/#eu/dM52GrafLfl3osNgEGSwcqzo_D4u1taocO3cw_vtQdd_wpoCQBBOKJ8LgIBbTCxW">msg.33</a></li>
                <li>Monero: <a href="/static/monero.txt">83B5pKo .. FHe23Y</a></li>
                <li>Telegram: <a href="https://t.me/japangrab">japangrab</a></li>
                <li>Codeberg: <a href="https://codeberg.org/2ug">2ug</a></li>
            </ul>
        </noscript>
        <div class="js-only w-full min-h-screen md:min-h-0 md:max-w-lg md:rounded-2xl md:border md:border-text/10 md:shadow-lg md:overflow-hidden md:my-8 flex flex-col bg-bg">
            <main class="flex flex-1 text-md items-center justify-center flex-col pb-20 pt-10">
                <div class="die" id="die"></div>
                <div class="result" id="result">
                    <span class="inline-flex items-center gap-2">
                        <span class="h-6 w-0" aria-hidden="true"></span>
                        Roll a die!
                    </span>
                </div>
            </main>
            <footer class="flex items-center justify-between px-4 py-2 border-t border-text/10 text-md">
                <nav class="flex gap-3">
                    <a href="https://ring.liampas.ca/left" class="hover:underline" aria-label="Previous">&lt;&lt;</a>
                    <a href="https://ring.liampas.ca/random" class="hover:underline" aria-label="Random">##</a>
                    <a href="https://ring.liampas.ca/right" class="hover:underline" aria-label="Next">&gt;&gt;</a>
                </nav>
                <form id="blackbox-form" class="relative flex">
                    <input type="text" id="blackbox-input" placeholder="Drop a message..." class="bg-bg border border-text/20 rounded min-h-content px-2 py-1 pr-8 text-md text-text focus:outline-none focus:border-hyperlink w-full text-overflow">
                    <button type="submit" aria-label="Send" class="absolute right-1 top-1/2 -translate-y-1/2 inline-flex items-center cursor-pointer hover:text-text"><img src="/static/icons/util/send.svg" alt="Send" class="h-6 w-6 transition-all duration-200"></button>
                </form>
            </footer>
        </div>
    </body>
</html>
